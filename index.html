<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>VERSION-MINDAR-BOX-01</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: sans-serif;
    }

    .label {
      position: fixed;
      left: 50%;
      top: 20px;
      transform: translateX(-50%);
      color: white;
      background: rgba(255, 0, 120, 0.8);
      padding: 10px 14px;
      border-radius: 12px;
      z-index: 20;
      font-size: 16px;
      font-weight: bold;
    }

    .hint {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      z-index: 20;
      color: white;
      background: rgba(0, 0, 0, 0.45);
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 14px;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="label">VERSION-MINDAR-BOX-01</div>
  <div class="hint">請將鏡頭對準名片</div>

  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: yes; uiLoading: yes; uiError: yes;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    embedded
  >
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-box
        position="0 0.3 0"
        depth="0.08"
        height="0.5"
        width="0.5"
        color="#ff5fa2"
      ></a-box>

      <a-circle
        position="0 0.02 -0.02"
        rotation="-90 0 0"
        radius="0.16"
        color="#000000"
        opacity="0.18"
      ></a-circle>
    </a-entity>
  </a-scene>
</body>
</html>
