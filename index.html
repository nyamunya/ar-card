<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VERSION-TEST-01</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: sans-serif;
    }
    #video {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      background: #000;
    }
    .label {
      position: fixed;
      left: 50%;
      top: 20px;
      transform: translateX(-50%);
      color: white;
      background: rgba(255,0,100,0.75);
      padding: 10px 14px;
      border-radius: 12px;
      z-index: 20;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="label">VERSION-TEST-01</div>
  <video id="video" autoplay playsinline muted></video>

  <script>
    async function startCamera() {
      const video = document.getElementById("video");
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: "environment" } },
          audio: false
        });
        video.srcObject = stream;
        await video.play();
      } catch (err) {
        alert("相機啟動失敗：" + err.name + " / " + err.message);
      }
    }
    startCamera();
  </script>
</body>
</html>
