<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: black;
      }

      .hint {
        position: fixed;
        left: 50%;
        bottom: 20px;
        transform: translateX(-50%);
        z-index: 20;
        color: white;
        background: rgba(0, 0, 0, 0.45);
        padding: 10px 14px;
        border-radius: 999px;
        font-size: 14px;
        white-space: nowrap;
        font-family: sans-serif;
      }
    </style>
  </head>
  <body>
    <div class="hint">請將鏡頭對準名片</div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-assets>
        <video
          id="characterVideo"
          src="./videos/character.mp4"
          preload="auto"
          autoplay
          muted
          loop
          playsinline
          webkit-playsinline
          crossorigin="anonymous"
        ></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target0" mindar-image-target="targetIndex: 0">
        <a-circle
          position="0 0.02 -0.02"
          rotation="-90 0 0"
          radius="0.16"
          color="#000000"
          opacity="0.18"
        ></a-circle>

        <a-plane
          id="videoPlane"
          rotation="0 0 0"
          position="0 0.3 0"
          width="0.75"
          height="1.1"
          src="#characterVideo"
          material="shader: flat; side: double;"
        ></a-plane>
      </a-entity>
    </a-scene>

    <script>
      const video = document.querySelector("#characterVideo");
      const target0 = document.querySelector("#target0");

      const playVideo = async () => {
        try {
          video.muted = true;
          await video.play();
          console.log("video playing");
        } catch (e) {
          console.error("video play failed", e);
        }
      };

      target0.addEventListener("targetFound", () => {
        playVideo();
      });

      document.body.addEventListener("click", playVideo, { once: true });
      document.body.addEventListener("touchstart", playVideo, { once: true });
    </script>
  </body>
</html>
