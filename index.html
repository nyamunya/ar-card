<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
  #bottom-container {
    position: fixed;
    bottom: 150px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 999;

    display: flex;
    gap: 10px;
  }

  .bottom-btn {
    padding: 10px 16px;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(10px);

    color: white;
    font-size: 14px;
    border-radius: 999px;
    text-decoration: none;

    display: flex;
    align-items: center;
    gap: 6px;

    pointer-events: auto;
  }

  .bottom-btn:hover {
    background: rgba(0, 0, 0, 0.8);
  }
      <style>
#ui-layer {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;

  pointer-events: none;
  z-index: 9999;
}

/* LOGO */
#logo-ui {
  position: absolute;
  top: 0vh;
  right: 2vw;

  width: 200px;
  max-width: 250px;
  
  height: auto;

  opacity: 0.95;
  filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
}
</style>
    <script>
AFRAME.registerShader("chromakey", {
  schema: {
    src: { type: "map", is: "uniform" },
    color: { type: "color", is: "uniform", default: "#00ff00" },
    threshold: { type: "number", is: "uniform", default: 0.70 },
    softness: { type: "number", is: "uniform", default: 0.15 }
  },

  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,

  fragmentShader: `
    uniform sampler2D src;
    uniform vec3 color;
    uniform float threshold;
    uniform float softness;
    varying vec2 vUv;

    void main() {
      vec4 tex = texture2D(src, vUv);
      float diff = distance(tex.rgb, color);
      float alpha = smoothstep(threshold, threshold + softness, diff);
      gl_FragColor = vec4(tex.rgb, alpha * tex.a);
    }
  `
});
</script>
  </head>
  <body>
    <div id="ui-layer">
  <img id="logo-ui" src="./logo.png?v=3" />
</div>
    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <!-- 你的影片 -->
        <video
          id="characterVideo"
          src="./videos/character.mp4"
          preload="auto"
          autoplay
          muted
          loop
          playsinline
          webkit-playsinline
          crossorigin="anonymous"
        ></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target" mindar-image-target="targetIndex: 0">
        
        <!-- 你的影片取代原本 card + model -->
        <a-plane
          src="#characterVideo"
          position="0 1 0"
          height="2"
          width="2"
          rotation="70 0 0"
          material="shader: chromakey; src: #characterVideo; color: #00ff00; threshold: 0.70; softness: 0.15; transparent: true; side: double;"
        ></a-plane>

      </a-entity>

    </a-scene>

    <script>
      const video = document.querySelector("#characterVideo");
      const target = document.querySelector("#target");

      const playVideo = async () => {
        try {
          video.muted = true;
          await video.play();
        } catch (e) {
          console.log("video play failed", e);
        }
      };

      target.addEventListener("targetFound", () => {
        playVideo();
      });

      document.body.addEventListener("click", playVideo, { once: true });
      document.body.addEventListener("touchstart", playVideo, { once: true });
    </script>
    <div id="bottom-container">
  <a class="bottom-btn" href="https://miaomubushimao.wixsite.com/nyamunya" target="_blank">
    ✨ 個人網頁
  </a>

  <a class="bottom-btn" href="https://x.com/Nyamu_nya_" target="_blank">
    🐦 Twitter
  </a>
</div>
  </body>
</html>
