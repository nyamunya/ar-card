<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
  #bottom-container {
    position: fixed;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 999;

    display: flex;
    gap: 10px;
  }

  .bottom-btn {
    padding: 10px 16px;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(10px);

    color: white;
    font-size: 14px;
    border-radius: 999px;
    text-decoration: none;

    display: flex;
    align-items: center;
    gap: 6px;

    pointer-events: auto;
  }

  .bottom-btn:hover {
    background: rgba(0, 0, 0, 0.8);
  }
</style>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <!-- 你的影片 -->
        <video
          id="characterVideo"
          src="./videos/character.mp4"
          preload="auto"
          autoplay
          muted
          loop
          playsinline
          webkit-playsinline
          crossorigin="anonymous"
        ></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target" mindar-image-target="targetIndex: 0">
        
        <!-- 你的影片取代原本 card + model -->
        <a-plane
          src="#characterVideo"
          position="0 0.5 0"
          height="0.75"
          width="1"
          rotation="70 0 0"
          material="shader: flat; side: double;"
        ></a-plane>

      </a-entity>

    </a-scene>

    <script>
      const video = document.querySelector("#characterVideo");
      const target = document.querySelector("#target");

      const playVideo = async () => {
        try {
          video.muted = true;
          await video.play();
        } catch (e) {
          console.log("video play failed", e);
        }
      };

      target.addEventListener("targetFound", () => {
        playVideo();
      });

      document.body.addEventListener("click", playVideo, { once: true });
      document.body.addEventListener("touchstart", playVideo, { once: true });
    </script>
    <div id="bottom-container">
  <a class="bottom-btn" href="https://miaomubushimao.wixsite.com/nyamunya" target="_blank">
    ✨ Portfolio
  </a>

  <a class="bottom-btn" href="https://x.com/Nyamu_nya_" target="_blank">
    🐦 Twitter
  </a>
</div>
  </body>
</html>
