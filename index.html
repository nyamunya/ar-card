<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <!-- 🔥 綠幕 shader（只加這段） -->
    <script>
      AFRAME.registerShader("chromakey", {
        schema: {
          src: { type: "map" },
          color: { type: "color", default: "#00ff00" },
          similarity: { type: "number", default: 0.28 },
          smoothness: { type: "number", default: 0.10 }
        },

        init: function (data) {
          this.material = new THREE.ShaderMaterial({
            uniforms: {
              map: { value: data.src },
              keyColor: { value: new THREE.Color(data.color) },
              similarity: { value: data.similarity },
              smoothness: { value: data.smoothness }
            },
            vertexShader: `
              varying vec2 vUv;
              void main() {
                vUv = uv;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
              }
            `,
            fragmentShader: `
              uniform sampler2D map;
              uniform vec3 keyColor;
              uniform float similarity;
              uniform float smoothness;
              varying vec2 vUv;

              void main() {
                vec4 color = texture2D(map, vUv);
                float dist = distance(color.rgb, keyColor);

                float alpha = smoothstep(similarity, similarity + smoothness, dist);

                if(alpha < 0.02) discard;

                gl_FragColor = vec4(color.rgb, alpha);
              }
            `,
            transparent: true,
            side: THREE.DoubleSide
          });
        }
      });
    </script>
  </head>

  <body>
    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video
          id="characterVideo"
          src="./videos/character.mp4"
          preload="auto"
          autoplay
          muted
          loop
          playsinline
          webkit-playsinline
          crossorigin="anonymous"
        ></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target" mindar-image-target="targetIndex: 0">

        <a-plane
          position="0 0 0"
          height="1"
          width="1"
          rotation="0 0 0"
          material="shader: chromakey; src: #characterVideo"
        ></a-plane>

      </a-entity>
    </a-scene>

    <script>
      const video = document.querySelector("#characterVideo");
      const target = document.querySelector("#target");

      const playVideo = async () => {
        try {
          video.muted = true;
          await video.play();
        } catch (e) {
          console.log("video play failed", e);
        }
      };

      target.addEventListener("targetFound", () => {
        playVideo();
      });

      document.body.addEventListener("click", playVideo, { once: true });
      document.body.addEventListener("touchstart", playVideo, { once: true });
    </script>
  </body>
</html>
